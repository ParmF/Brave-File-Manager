version: "3"

vars:
  BINARY: bravefm
  DIST: dist
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-dev"

tasks:
  default:
    desc: Build the application binary
    cmds:
      - task: build

  build:
    desc: Compile Brave File Manager
    env:
      CGO_ENABLED: 1
    cmds:
      - mkdir -p {{.DIST}}
      - go build -trimpath -ldflags="-s -w" -o {{.DIST}}/{{.BINARY}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.DIST}}/{{.BINARY}}"

  run:
    desc: Run the application
    env:
      CGO_ENABLED: 1
    cmds:
      - go run .

  test:
    desc: Run unit tests
    cmds:
      - go test ./internal/...

  vet:
    desc: Run go vet on internal packages
    cmds:
      - go vet ./internal/...

  tidy:
    desc: Tidy Go module dependencies
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.DIST}} "Brave File Manager.app"
      - go clean

  dmg:
    desc: Build a macOS .app bundle and DMG (macOS only)
    platforms: [darwin]
    env:
      CGO_ENABLED: 1
    cmds:
      - mkdir -p {{.DIST}}
      - chmod +x scripts/package-macos.sh
      - scripts/package-macos.sh arm64 {{.VERSION}} {{.DIST}}/BraveFileManager-darwin-arm64.dmg

  dmg:all:
    desc: Build DMGs for Apple Silicon and Intel (macOS only)
    platforms: [darwin]
    env:
      CGO_ENABLED: 1
    cmds:
      - mkdir -p {{.DIST}}
      - chmod +x scripts/package-macos.sh
      - scripts/package-macos.sh arm64 {{.VERSION}} {{.DIST}}/BraveFileManager-darwin-arm64.dmg
      - scripts/package-macos.sh amd64 {{.VERSION}} {{.DIST}}/BraveFileManager-darwin-amd64.dmg
